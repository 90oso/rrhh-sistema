<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión · RRHH Sistema</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #121824;
    color: #e2e8f0;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .brand { text-align: center; margin-bottom: 28px; }
  .brand h1 { color: #3b82f6; margin: 0 0 6px; font-size: 22px; }
  .brand p { color: #94a3b8; margin: 0; font-size: 13px; }
  .card {
    background-color: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 32px;
    width: 100%;
    max-width: 360px;
  }
  label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
  input {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 18px;
    border-radius: 8px;
    border: 1px solid #334155;
    background-color: #0f172a;
    color: #e2e8f0;
    font-size: 14px;
  }
  input:focus { outline: none; border-color: #3b82f6; }
  button {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 8px;
    background-color: #3b82f6;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.15s;
  }
  button:hover { background-color: #2563eb; }
  button:disabled { background-color: #334155; cursor: not-allowed; }
  .error {
    background-color: #450a0a;
    color: #fca5a5;
    border: 1px solid #7f1d1d;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .hint { text-align: center; font-size: 12px; color: #64748b; margin-top: 20px; }
</style>
</head>
<body>

  <div class="brand">
    <h1>Sistema de Recursos Humanos</h1>
    <p>Inicia sesión para continuar</p>
  </div>

  <div class="card">
    <div class="error" id="error-msg"></div>
    <form id="form-login">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" name="email" required autocomplete="username" placeholder="tucorreo@empresa.com">

      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">

      <button type="submit" id="btn-login">Ingresar</button>
    </form>
    <p class="hint">¿Problemas para entrar? Contacta al administrador del sistema.</p>
  </div>

<script type="module">
  import { supabase } from './frontend/supabase-client.js';
  import { guardarSesion, getSesion } from './frontend/auth-guard.js';

  // Si ya hay sesión activa, no mostrar el login de nuevo.
  if (getSesion()) {
    location.href = 'index.html';
  }

  const form = document.getElementById('form-login');
  const btn = document.getElementById('btn-login');
  const errorMsg = document.getElementById('error-msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Verificando...';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const { data, error } = await supabase.rpc('login_usuario', {
        p_email: email,
        p_password: password,
      });

      if (error) throw error;

      if (!data || data.length === 0) {
        errorMsg.textContent = 'Correo o contraseña incorrectos.';
        errorMsg.style.display = 'block';
        return;
      }

      guardarSesion(data[0]); // { id, nombre, email, rol, empleado_id }
      location.href = 'index.html';

    } catch (err) {
      console.error(err);
      errorMsg.textContent = 'No se pudo conectar. Intenta de nuevo.';
      errorMsg.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Ingresar';
    }
  });
</script>
</body>
</html>
