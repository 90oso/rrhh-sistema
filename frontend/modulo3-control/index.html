<!-- JAVASCRIPT: switched to module and importing centralized supabase client -->
<script type="module">
import { supabase } from '../supabase-client.js';
const db = supabase;
// placeholders kept for esDemo()
const SUPABASE_URL = 'https://TU_PROYECTO.supabase.co';
const SUPABASE_ANON_KEY = 'TU_ANON_KEY';

// ── ESTADO ──
let empleados = [];
let asistencias = []; // del día actual
let ausencias = [];
let vacaciones = [];
let tabActual = 'asistencia';
let geoDentro = true;

// (the rest of the original JS continues unchanged and uses "db")

async function iniciar() {
  const { error } = await db.from('empleados').select('id').limit(1);
  const dot = document.getElementById('sdot');
  const txt = document.getElementById('stxt');
  const statusEl = document.getElementById('db-status');

  if (error) {
    dot.style.background = '#F59E0B';
    txt.textContent = 'Modo demo — configura Supabase para persistencia';
    setTimeout(() => statusEl.classList.add('hidden'), 4000);
    // cargar datos demo localmente si lo deseas
  } else {
    dot.style.background = '#22C55E';
    txt.textContent = 'Conectado a Supabase';
    setTimeout(() => statusEl.classList.add('hidden'), 2000);
    // llamar a funciones de carga/suscripción si existen
  }
}

// Arrancar la app
iniciar();
</script>
